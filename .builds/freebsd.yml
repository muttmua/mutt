image: freebsd/latest
packages:
- autoconf
- automake
- gettext-runtime
- gettext-tools
- gpgme
- hs-ShellCheck
- indexinfo
- kyotocabinet
- libassuan
- libgpg-error
- libiconv
- libidn2
- libunistring
- mime-support
- urlview
sources:
- https://git.sr.ht/~mutt/mutt
environment:
  NPROC: '8'
tasks:
- check: |
    cd mutt
    autoreconf --version
    ./prepare
    make check-local

- default: |
    cd mutt
    ./.builds/build default

- original_freebsd: |
    cd mutt
    ./.builds/build original_freebsd

- lto: |
    cd mutt
    ./.builds/build lto
