image: openbsd/latest
packages:
- autoconf-2.72p0
- automake-1.18
- gettext-runtime
- gettext-tools
- gpgme
- indexinfo
- kyotocabinet
- libassuan
- libgpg-error
- libiconv
- libidn2
- libunistring
- qdbm
- shellcheck
sources:
- https://git.sr.ht/~mutt/mutt
environment:
  AUTOCONF_VERSION: 2.72
  AUTOMAKE_VERSION: 1.18
  LDFLAGS: -L/usr/local/lib
  NPROC: '8'
tasks:
- check: |
    cd mutt
    autoreconf --version
    ./prepare
    make check-local

- default: |
    cd mutt
    ./.builds/build default

- without-wc-funcs: |
    cd mutt
    ./.builds/build without_wc_funcs

- original_freebsd: |
    cd mutt
    ./.builds/build original_freebsd

- openbsd: |
    cd mutt
    ./.builds/build openbsd
