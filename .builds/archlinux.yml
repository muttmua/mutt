image: archlinux
packages:
- autoconf
- automake
- cyrus-sasl
- gdbm
- gettext
- gpgme
- libidn2
- ncurses
- openssl
- perl
- shellcheck
- tcc
- tcc-libs-static
sources:
- https://git.sr.ht/~mutt/mutt
environment:
  NPROC: '8'
tasks:
- check: |
    cd mutt
    autoreconf --version
    ./prepare
    make check-local

- default: |
    cd mutt
    ./.builds/build default

- original: |
    cd mutt
    ./.builds/build original

- tcc: |
    cd mutt
    ./.builds/build tcc

- lto: |
    cd mutt
    ./.builds/build lto
