image: debian/stable
submitter:
  git.sr.ht:
    enabled: false
packages:
- autoconf
- automake
- gettext
- libgdbm-dev
- libgpgme-dev
- libidn2-dev
- libncurses-dev
- libsasl2-dev
- libssl-dev
- shellcheck
- tcc
sources:
- https://git.sr.ht/~mutt/mutt
environment:
  NPROC: '8'
tasks:
- check: |
    cd mutt
    autoreconf --version
    ./prepare
    make check-local

- default: |
    cd mutt
    ./.builds/build default

- without-wc-funcs: |
    cd mutt
    ./.builds/build without_wc_funcs

- original: |
    cd mutt
    ./.builds/build original

- tcc: |
    cd mutt
    ./.builds/build tcc
