image: alpine/edge
packages:
- autoconf
- automake
- cyrus-sasl-dev
- gdbm-dev
- gettext-dev
- gpgme-dev
- libidn2-dev
- ncurses-dev
- openssl-dev
- perl
- shellcheck
- tcc
- tcc-libs-static
sources:
- https://git.sr.ht/~mutt/mutt
environment:
  NPROC: '8'
tasks:
- check: |
    cd mutt
    autoreconf --version
    ./prepare
    make check-local

- default: |
    cd mutt
    ./.builds/build default

- without-wc-funcs: |
    cd mutt
    ./.builds/build without_wc_funcs

- original: |
    cd mutt
    ./.builds/build original

- tcc: |
    cd mutt
    ./.builds/build tcc

- lto: |
    cd mutt
    ./.builds/build lto
